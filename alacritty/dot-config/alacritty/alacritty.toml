# Minimal alacritty config. Colors come from Noctalia's M3 palette,
# regenerated on every wallpaper or theme change. Font is JetBrains Mono.
#
# Noctalia writes the colors file to ~/.config/alacritty/themes/noctalia.toml
# and patches this file to import it — the import line below already
# points at the right location, so Noctalia's idempotent apply.sh is
# a no-op after the first sync.

[general]
import = [
    "~/.config/alacritty/themes/noctalia.toml",
]

[font.normal]
family = "JetBrains Mono"
