# Noctalia v5 — zentoo evaluation config.

[shell]
offline_mode = false                # community palette + community templates fetch enabled

[bar.default]
margin_edge = 0
thickness = 38
reserve_space = true

[wallpaper]
directory = "~/img/wallpaper"

[theme]
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-tonal-spot"

[theme.templates]
enable_builtin_templates = true
enable_community_templates = true
builtin_ids = ["foot", "gtk3", "gtk4", "niri", "starship"]
community_ids = ["yazi"]

[idle.behavior.screen-off]
timeout = 300
command = "noctalia:dpms-off"
resume_command = "noctalia:dpms-on"
enabled = true

# Runtime hooks: run a shell command when noctalia broadcasts an event.
# See references/configuration.md § [hooks] in the noctalia customization skill.
[hooks]
# Flip vimb dark-mode to match the system theme.  Helper script lives at
# ~/dotfiles/bin/dot-local/bin/vimb-theme-flip; mode name (dark|light) is
# passed as $1.
theme_mode_changed = "/home/craig/.local/bin/vimb-theme-flip"
