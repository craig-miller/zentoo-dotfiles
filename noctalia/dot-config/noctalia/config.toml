# Noctalia v5 — zentoo evaluation config.

[shell]
offline_mode = false                # community palette + community templates fetch enabled

[bar.default]
margin_edge = 0
thickness = 38
reserve_space = true

[wallpaper]
directory = "~/Pictures/Wallpaper"

[theme]
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-tonal-spot"

[theme.templates]
enable_builtin_templates = true
enable_community_templates = true
builtin_ids = ["foot", "gtk3", "gtk4", "niri", "starship"]
community_ids = ["yazi"]

[idle.behavior.screen-off]
timeout = 300
command = "noctalia:dpms-off"
resume_command = "noctalia:dpms-on"
enabled = true
