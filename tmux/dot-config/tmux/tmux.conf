# Tmux 3.x minimal config — vi mode, prefix C-a, RGB-capable, sensible defaults.

# Prefix: Ctrl-a (frees Ctrl-b, more reachable than default).
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Terminal capabilities (ghostty advertises xterm-ghostty).
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB"

# Mouse + larger scrollback.
set -g mouse on
set -g history-limit 100000

# Vi-style modal selection (matches editor muscle memory).
setw -g mode-keys vi
set -g status-keys vi

# Faster escape (don't lag vi in nested ssh).
set -sg escape-time 10

# Sane indexing: panes/windows start at 1.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload binding.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
