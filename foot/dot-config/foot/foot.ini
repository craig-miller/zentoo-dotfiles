# Minimal foot config. Colors come from noctalia's M3 palette,
# regenerated on every wallpaper or theme change. Font is the system
# monospace default (JetBrainsMono Nerd Font Mono, per
# /etc/fonts/conf.d/60-monospace-jetbrainsmono.conf).
#
# Noctalia writes the colors file to ~/.config/foot/themes/noctalia and
# patches this file to include it — the include line below already points
# at the right location, so noctalia's idempotent apply.sh is a no-op
# after the first sync.

[main]
include=~/.config/foot/themes/noctalia
font=monospace:size=13
pad=10x10

[colors-dark]
alpha=0.8
